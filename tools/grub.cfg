set timeout=3
set default=0

if [ "$grub_platform" = "pc" ]; then
    menuentry "ForthOS - Bare Metal Forth" {
        linux16 /memdisk harddisk
        initrd16 /forth.img
    }
else
    menuentry "ForthOS - Reboot to Legacy/CSM mode" {
        echo ""
        echo "  ForthOS requires Legacy/CSM boot mode."
        echo "  Press Enter to reboot to BIOS Setup (F10 on HP)."
        echo "  Then boot this USB WITHOUT the UEFI: prefix."
        echo ""
        read
        fwsetup
    }
fi

menuentry "Reboot" {
    reboot
}
